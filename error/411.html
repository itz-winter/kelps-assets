<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>411 Length Required — Assets</title>
  <link rel="stylesheet" href="/style/ammonite.css">
  <script src="/style/theme-init.js"></script>
  <style>
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 2rem;
      gap: 1rem;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 900;
      color: var(--brand-primary);
      line-height: 1;
      letter-spacing: -4px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .error-desc {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 420px;
      margin: 0;
      line-height: 1.6;
    }

    .error-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 10px 24px;
      background: var(--brand-primary);
      color: #000;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: opacity .15s;
    }

    .error-btn:hover {
      opacity: 0.85;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <header class="site-header"><button class="sidebar-toggle">&#9776;</button><a class="site-logo" href="/">Assets</a>
  </header>
  <div class="site-body">
    <aside class="sidebar"></aside>
    <div class="sidebar-backdrop"></div>
    <main class="content">
      <div class="content-inner">
        <div class="error-wrap">
          <div class="error-code">411</div>
          <p class="error-title">Length Required</p>
          <p class="error-desc">The request must include a valid Content-Length header.</p>
          <a class="error-btn" href="https://assets.kelpw.ing">Return to Homepage</a>
        </div>
      </div>
    </main>
  </div>
  <script src="/site.js"></script>
</body>

</html>
